name: Deploy Docs Review

on:
  push:
    branches: [main]
    paths:
      - "projects/**/docs/**"
      - "docs-review.config.yml"
  workflow_dispatch:

jobs:
  deploy:
    uses: mcanas/docs-review/.github/workflows/reusable-deploy.yml@main
    with:
      config-path: docs-review.config.yml
    secrets:
      client-id: ${{ secrets.DOCS_REVIEW_OAUTH_CLIENT_ID }}
    permissions:
      contents: write
      pages: write
      id-token: write
