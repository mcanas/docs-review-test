name: Deploy Docs Review

on:
  push:
    branches: [main]
    paths:
      - "projects/**/docs/**"
      - "docs-review.config.yml"
  workflow_dispatch:

jobs:
  deploy:
    uses: mcanas/docs-review/.github/workflows/reusable-deploy.yml@main
    with:
      config-path: docs-review.config.yml
    secrets:
      read-token: ${{ secrets.DOCS_REVIEW_READ_TOKEN }}
    permissions:
      contents: write
      pages: write
      id-token: write
